<!DOCTYPE html>
<!-- AI assisted development -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Employee directory for our team — leadership, technology, and revenue operations. Find colleagues, roles, skills, and contact information."
    />
    <meta
      name="keywords"
      content="employee directory, team, leadership, RevOps, technology, contact"
    />
    <meta name="author" content="Founder's Office" />
    <meta name="theme-color" content="#f4f6f9" />

    <meta property="og:title" content="Employee Directory" />
    <meta
      property="og:description"
      content="Browse our team: profiles, skills, locations, and how to reach us."
    />
    <meta property="og:type" content="website" />

    <title>Employee Directory | Team Profiles</title>

    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to directory</a>

    <header class="site-header">
      <div class="site-header__inner">
        <div class="brand">
          <span class="brand__mark" aria-hidden="true"></span>
          <div>
            <h1 class="brand__title">Employee Directory</h1>
            <p class="brand__tagline">People, roles, and how to connect</p>
          </div>
        </div>
        <div class="search-wrap">
          <label class="visually-hidden" for="search-input">Search employees</label>
          <input
            id="search-input"
            class="search-input"
            type="search"
            placeholder="Search by name, role, department, or skills…"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
      </div>
    </header>

    <main id="main-content" class="main">
      <p id="search-status" class="search-status" role="status" aria-live="polite"></p>
      <div id="directory-root" class="directory-root" aria-busy="true"></div>
    </main>

    <footer class="site-footer">
      <p>Internal directory · For team use only</p>
    </footer>

    <script src="js/app.js" defer></script>
  </body>
</html>

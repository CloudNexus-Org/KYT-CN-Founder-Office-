<!DOCTYPE html>
<!-- AI assisted development -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- GitHub Pages project sites are served under /repo-name/. Without <base>, relative
         asset URLs can resolve to the domain root (404), so the stylesheet never loads. -->
    <script>
      (function () {
        var host = location.hostname;
        if (!/\.github\.io$/i.test(host)) return;
        var parts = location.pathname.split("/").filter(Boolean);
        if (!parts.length) return;
        var repo = parts[0];
        if (/\.html?$/i.test(repo)) return;
        var b = document.createElement("base");
        b.href = "/" + repo + "/";
        document.head.appendChild(b);
      })();
    </script>
    <!-- Fallback if main.css fails to load (still read dark UI intent) -->
    <style>
      html {
        background-color: #000;
        color-scheme: dark;
      }
      body {
        margin: 0;
        background-color: #000;
        color: #fff;
      }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Employee Directory — Know your team. CN Founder's Office: leadership, technology, and revenue operations. Profiles, skills, and contact information."
    />
    <meta
      name="keywords"
      content="CloudNexus, employee directory, team, leadership, RevOps, technology, contact"
    />
    <meta name="author" content="CloudNexus" />
    <meta name="theme-color" content="#000000" />

    <meta property="og:title" content="CloudNexus | Employee Directory" />
    <meta
      property="og:description"
      content="Know your team - CN Founder's Office. Profiles, skills, locations, and how to reach us."
    />
    <meta property="og:type" content="website" />

    <title>Employee Directory · CN Founder's Office | CloudNexus</title>

    <link rel="icon" href="assets/cloudnexus-logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="assets/cloudnexus-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/styles.css?v=2" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to directory</a>

    <header class="site-header">
      <div class="site-header__inner">
        <div class="brand">
          <img
            class="brand__logo"
            src="assets/cloudnexus-logo.png"
            width="48"
            height="48"
            alt="CloudNexus"
            decoding="async"
          />
          <div class="brand__text">
            <p class="brand__company">CloudNexus</p>
            <h1 class="brand__title">Employee Directory</h1>
            <p class="brand__tagline">Know your team - CN Founder&rsquo;s Office</p>
          </div>
        </div>
        <div class="search-wrap">
          <label class="visually-hidden" for="search-input">Search employees</label>
          <input
            id="search-input"
            class="search-input"
            type="search"
            placeholder="Search by name, role, department, or skills…"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
      </div>
    </header>

    <main id="main-content" class="main">
      <p id="search-status" class="search-status" role="status" aria-live="polite"></p>
      <div id="directory-root" class="directory-root" aria-busy="true"></div>
    </main>

    <footer class="site-footer">
      <p><span class="site-footer__brand">CloudNexus</span> · CN Founder&rsquo;s Office · Internal directory</p>
    </footer>

    <script src="js/app.js?v=2" defer></script>
  </body>
</html>

<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- GitHub Pages project sites are served under /repo-name/. Without <base>, relative
         asset URLs can resolve to the domain root (404), so the stylesheet never loads. -->
    <script>
      (function () {
        var host = location.hostname;
        if (!/\.github\.io$/i.test(host)) return;
        var parts = location.pathname.split("/").filter(Boolean);
        if (!parts.length) return;
        var repo = parts[0];
        if (/\.html?$/i.test(repo)) return;
        var b = document.createElement("base");
        b.href = "/" + repo + "/";
        document.head.appendChild(b);
      })();
    </script>
    <!-- Fallback if main.css fails to load (still read dark UI intent) -->
    <style>
      html {
        background-color: #000;
        color-scheme: dark;
      }
      body {

        background-color: #000;

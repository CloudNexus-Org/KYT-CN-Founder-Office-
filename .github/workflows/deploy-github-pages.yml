# AI assisted development
# Deploy static site to GitHub Pages (official actions/upload-pages-artifact + deploy-pages).
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm ci

      - name: Build app
        run: |
          npm run build

      # configure-pages omitted: it calls GET /repos/.../pages and returns 404 until
      # Settings → Pages → Source is set to "GitHub Actions". This static site
      # does not need base_url / SSG outputs from that action.

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

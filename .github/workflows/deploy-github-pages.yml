# AI assisted development
# Deploy static site to GitHub Pages (official actions/upload-pages-artifact + deploy-pages).
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site bundle
        run: |
          mkdir -p _site
          cp index.html favicon.svg _site/
          cp -r css js _site/

      # configure-pages omitted: it calls GET /repos/.../pages and returns 404 until
      # Settings → Pages → Source is set to "GitHub Actions". This static site
      # does not need base_url / SSG outputs from that action.

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
